services:
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      # TODO(absurek): Hotfix for DooD DevContainer relative paths
      - /home/sureka/github.com/absurek/udemy-opentelemetry-for-observability/compose/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - observability
    restart: unless-stopped

volumes:
  prometheus-data:
