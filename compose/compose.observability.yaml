services:
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      # TODO(absurek): Hotfix for DooD DevContainer relative paths
      - /home/sureka/github.com/absurek/udemy-opentelemetry-for-observability/compose/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - observability
    restart: unless-stopped

  loki:
    image: grafana/loki:3.6.6
    container_name: loki
    user: root
    command:
      - '-config.file=/etc/loki/loki-config.yaml'
      - '-target=all'
    volumes:
      # TODO(absurek): Hotfix for DooD DevContainer relative paths
      - /home/sureka/github.com/absurek/udemy-opentelemetry-for-observability/compose/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
      - loki-wal:/wal
    ports:
      - '3100:3100'
    networks:
      - observability
    restart: unless-stopped

volumes:
  prometheus-data:
  loki-data:
  loki-wal:
